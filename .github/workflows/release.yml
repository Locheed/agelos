name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            runtime: linux-x64
            artifact: agelos-linux-x64
            binary: agelos
          # linux-arm64 temporarily removed — cross-compilation toolchain issue
          - os: macos-13
            runtime: osx-x64
            artifact: agelos-darwin-x64
            binary: agelos
          - os: macos-latest
            runtime: osx-arm64
            artifact: agelos-darwin-arm64
            binary: agelos
          - os: windows-latest
            runtime: win-x64
            artifact: agelos-windows-x64
            binary: agelos.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Agelos.Cli/Agelos.Cli.csproj

      - name: Install ARM64 cross-compilation tools
        if: matrix.runtime == 'linux-arm64'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm lld gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu zlib1g-dev

      - name: Publish (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          dotnet publish src/Agelos.Cli/Agelos.Cli.csproj \
            -c Release \
            -r ${{ matrix.runtime }} \
            --self-contained \
            -o publish \
            ${{ matrix.runtime == 'linux-arm64' && '-p:LinkerFlavor=lld -p:CppCompilerAndLinker=clang-18 -p:ObjCopyName=aarch64-linux-gnu-objcopy' || '' }}
          
      - name: Publish (Windows)
        if: runner.os == 'Windows'
        run: |
          dotnet publish src/Agelos.Cli/Agelos.Cli.csproj `
            -c Release `
            -r ${{ matrix.runtime }} `
            --self-contained `
            -o publish

      - name: Rename binary
        shell: bash
        run: mv publish/${{ matrix.binary }} publish/${{ matrix.artifact }}${{ matrix.runtime == 'win-x64' && '.exe' || '' }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.artifact }}*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          prerelease: true
          files: |
            agelos-linux-x64/agelos-linux-x64
            agelos-darwin-x64/agelos-darwin-x64
            agelos-darwin-arm64/agelos-darwin-arm64
            agelos-windows-x64/agelos-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}